name: Desktop Build

on:
  # 快速迭代期间暂停自动 CI/CD,仅保留手动触发;恢复时取消下方注释即可
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   tags:
  #     - 'v*.*.*'
  #   paths:
  #     - 'src-tauri/**'
  #     - 'scripts/desktop/**'
  #     - 'agent/**'
  #     - 'frontend/**'
  #     - '.github/workflows/desktop-build.yml'
  #     - 'pyproject.toml'
  # pull_request:
  #   paths:
  #     - 'src-tauri/**'
  #     - 'scripts/desktop/**'
  #     - 'agent/**'
  #     - 'frontend/**'
  #     - '.github/workflows/desktop-build.yml'
  #     - 'pyproject.toml'

permissions:
  contents: write

# ── Python runtime 版本锁定 ──────────────────────────────────────────
# 升级时改这两行，缓存 key 自动失效并触发重新下载 + 安装。
# PBS_TAG 对应 python-build-standalone 的 release tag；
# PBS_PY  对应该 tag 下打包的 CPython 版本号。
env:
  PBS_TAG: '20260610'
  PBS_PY:  '3.12.13'

jobs:
  build:
    name: Desktop (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos-aarch64
            rust-target: aarch64-apple-darwin
            # asset 文件名固定，不再每次查 GitHub API
            python-asset: cpython-3.12.13+20260610-aarch64-apple-darwin-install_only.tar.gz
            python-bin: bin/python3
            bundle: dmg
            artifact-glob: src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            target: windows-x64
            rust-target: x86_64-pc-windows-msvc
            python-asset: cpython-3.12.13+20260610-x86_64-pc-windows-msvc-install_only.tar.gz
            # Windows install_only: python.exe 在顶层，无 bin/ 子目录
            python-bin: python.exe
            bundle: nsis
            artifact-glob: src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - uses: actions/checkout@v4

      # ── Node / npm 缓存 ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Rust 工具链 + 编译缓存 ──────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust-target }}

      # ── tauri-cli 缓存（避免每次从源码编译 3–5 分钟）──────────────
      - name: Cache tauri-cli binary
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-tauri
            ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-2-${{ runner.os }}-${{ matrix.rust-target }}

      - name: Install tauri-cli (if not cached)
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2" --locked

      # ── uv ──────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # ── Python runtime + Tier 0 依赖（合并缓存）────────────────────
      # runtime 下载到 .desktop-build/python-runtime；deps 也装在同目录下的
      # site-packages 里，因此两者合为一个缓存条目：
      #   key = PBS_TAG + PBS_PY + asset 名 + requirements-tier0.txt hash
      # 任意一项变更都会让缓存失效并触发完整重建；
      # 这样也绕开了 macOS(lib/) 与 Windows(Lib/) 大小写路径的差异。
      - name: Cache Python runtime + Tier 0 deps
        id: cache-python
        uses: actions/cache@v4
        with:
          path: .desktop-build/python-runtime
          key: python-${{ env.PBS_TAG }}-${{ env.PBS_PY }}-${{ matrix.python-asset }}-${{ hashFiles('scripts/desktop/requirements-tier0.txt') }}

      - name: Fetch Python Runtime (${{ matrix.target }})
        if: steps.cache-python.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          ASSET="${{ matrix.python-asset }}"
          URL="https://github.com/astral-sh/python-build-standalone/releases/download/${{ env.PBS_TAG }}/${ASSET}"
          OUT_DIR=".desktop-build/python-runtime"

          echo "Downloading $URL"
          tmp="$(mktemp -d)"
          curl -fL --progress-bar --connect-timeout 30 --retry 3 "$URL" -o "$tmp/runtime.tar.gz"
          mkdir -p "$OUT_DIR"
          tar -xzf "$tmp/runtime.tar.gz" -C "$tmp"
          mv "$tmp/python/"* "$OUT_DIR/"
          rm -rf "$tmp"
          echo "Runtime ready: $("$OUT_DIR/${{ matrix.python-bin }}" --version)"

      - name: Install Python Tier 0 deps (if not cached)
        if: steps.cache-python.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          PY=".desktop-build/python-runtime/${{ matrix.python-bin }}"
          echo "Installing Tier 0 deps (heavy deps deferred to venv bootstrap at user first-run)..."
          uv pip install --python "$PY" -r scripts/desktop/requirements-tier0.txt
          echo "Installed packages (head -40):"
          "$PY" -m pip list 2>/dev/null | head -40 || true

      - name: Verify Python runtime
        shell: bash
        run: |
          PY=".desktop-build/python-runtime/${{ matrix.python-bin }}"
          "$PY" --version
          echo "Running Tier 0 smoke checks..."
          PYTHONPATH=agent "$PY" scripts/desktop/smoke_tier0.py

      # ── 版本对齐 ────────────────────────────────────────────────────
      - name: Derive release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid release tag: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
            node scripts/desktop/sync-version.mjs "$VERSION"
            echo "desktop_release_version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "DESKTOP_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          else
            CURRENT_VERSION="$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")"
            node scripts/desktop/sync-version.mjs "$CURRENT_VERSION" --check
            echo "desktop_release_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          fi

      # ── 前端构建 ────────────────────────────────────────────────────
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # ── 控制台 UI ───────────────────────────────────────────────────
      - name: Build Console UI
        shell: bash
        run: bash scripts/desktop/build-console.sh

      # ── 组装桌面资源 ─────────────────────────────────────────────────
      - name: Assemble Desktop Resources (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: bash scripts/desktop/assemble.sh

      - name: Assemble Desktop Resources (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .\scripts\desktop\assemble.ps1

      # ── macOS 额外依赖 ───────────────────────────────────────────────
      - name: Install libiconv (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libiconv

      # ── Tauri 打包 ───────────────────────────────────────────────────
      # cargo tauri build 内部已执行 --release 编译，无需额外 cargo build --release
      - name: Package Tauri App
        working-directory: src-tauri
        run: cargo tauri build --bundles ${{ matrix.bundle }}

      # ── 上传产物 ─────────────────────────────────────────────────────
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Vibe-Trading-${{ steps.version.outputs.desktop_release_version }}-${{ matrix.target }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

  # ── 发布 Release（仅 tag 触发）──────────────────────────────────────
  release:
    name: Publish Desktop Release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" release-artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Vibe Trading ${TAG_NAME}" \
            --notes "Desktop installers built from ${TAG_NAME}."
