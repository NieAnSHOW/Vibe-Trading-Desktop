<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Trading 控制台</title>
    <style>
      :root {
        --bg: 220 24% 4%;
        --surface-1: 220 20% 8%;
        --surface-2: 220 20% 12%;
        --line: 220 18% 18%;
        --ink: 220 12% 93%;
        --ink-dim: 220 10% 66%;
        --brand: 27 90% 54%;
        --brand-strong: 27 92% 47%;
        --on-brand: 26 48% 13%;
        --ok: 145 62% 50%;
        --ok-fg: 145 58% 66%;
        --warn: 38 92% 55%;
        --warn-fg: 40 95% 66%;
        --bad: 0 75% 60%;
        --bad-fg: 0 88% 74%;
        --radius: 12px;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        color-scheme: dark;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        background: hsl(var(--bg));
        color: hsl(var(--ink));
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 40px 20px 32px;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
      }
      /* Warm ambient wash — carries the brand's "温暖/安心" on the app's front door.
       Purposeful, not decorative glass; kept subtle so log text stays crisp. */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(
            60% 45% at 50% -8%,
            hsl(var(--brand) / 0.14),
            transparent 70%
          ),
          radial-gradient(
            50% 40% at 90% 8%,
            hsl(217 90% 60% / 0.06),
            transparent 70%
          );
      }
      .console {
        position: relative;
        z-index: 1;
        width: min(560px, 100%);
      }

      /* Header */
      .head {
        display: flex;
        align-items: center;
        gap: 13px;
        margin-bottom: 6px;
      }
      .mark {
        flex: none;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        filter: drop-shadow(0 5px 14px hsl(var(--brand) / 0.22));
      }
      h1 {
        font-size: 19px;
        font-weight: 650;
        letter-spacing: -0.01em;
      }
      .sub {
        font-size: 13px;
        color: hsl(var(--ink-dim));
        margin-top: 1px;
      }

      /* Status card */
      .status {
        margin-top: 22px;
        background: hsl(var(--surface-1));
        border: 1px solid hsl(var(--line));
        border-radius: var(--radius);
        overflow: hidden;
      }
      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
      }
      .status-row + .status-row {
        border-top: 1px solid hsl(var(--line));
      }
      .status-label {
        font-size: 13.5px;
        color: hsl(var(--ink-dim));
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 4px 11px 4px 9px;
        border-radius: 999px;
        font-size: 12.5px;
        font-weight: 550;
        border: 1px solid transparent;
      }
      .badge .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex: none;
      }
      .badge.ok {
        background: hsl(var(--ok) / 0.14);
        color: hsl(var(--ok-fg));
        border-color: hsl(var(--ok) / 0.28);
      }
      .badge.ok .dot {
        background: hsl(var(--ok));
      }
      .badge.warn {
        background: hsl(var(--warn) / 0.14);
        color: hsl(var(--warn-fg));
        border-color: hsl(var(--warn) / 0.28);
      }
      .badge.warn .dot {
        background: hsl(var(--warn));
      }
      .badge.bad {
        background: hsl(var(--bad) / 0.14);
        color: hsl(var(--bad-fg));
        border-color: hsl(var(--bad) / 0.28);
      }
      .badge.bad .dot {
        background: hsl(var(--bad));
      }
      /* Live pulse only while a process is genuinely in flight */
      .badge.live .dot {
        animation: pulse 1.4s var(--ease) infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.45;
          transform: scale(0.7);
        }
      }

      /* Guidance: teaches the next action for the current env state */
      .hint {
        margin-top: 12px;
        font-size: 13px;
        color: hsl(var(--ink-dim));
        padding: 11px 14px;
        border-radius: 10px;
        background: hsl(var(--surface-1) / 0.6);
        border: 1px solid hsl(var(--line));
        display: flex;
        gap: 9px;
        align-items: flex-start;
      }
      .hint b {
        color: hsl(var(--ink));
        font-weight: 600;
      }
      .hint svg {
        flex: none;
        width: 15px;
        height: 15px;
        margin-top: 2px;
        color: hsl(var(--brand));
      }

      /* Actions */
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        margin-top: 16px;
      }
      button {
        font: inherit;
        font-size: 13.5px;
        font-weight: 550;
        cursor: pointer;
        padding: 9px 16px;
        border-radius: 9px;
        border: 1px solid transparent;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        transition:
          background 0.16s var(--ease),
          border-color 0.16s var(--ease),
          transform 0.12s var(--ease),
          opacity 0.16s var(--ease);
      }
      button:active:not(:disabled) {
        transform: translateY(1px);
      }
      button:focus-visible {
        outline: 2px solid hsl(var(--brand));
        outline-offset: 2px;
      }
      .btn-primary {
        background: hsl(var(--brand));
        color: hsl(var(--on-brand));
      }
      .btn-primary:hover:not(:disabled) {
        background: hsl(var(--brand-strong));
      }
      .btn-ghost {
        background: hsl(var(--surface-2));
        color: hsl(var(--ink));
        border-color: hsl(var(--line));
      }
      .btn-ghost:hover:not(:disabled) {
        background: hsl(var(--line));
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      button.busy {
        pointer-events: none;
      }
      .spinner {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        border: 2px solid currentColor;
        border-top-color: transparent;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Error */
      #err:not(:empty) {
        margin-top: 13px;
        font-size: 13px;
        color: hsl(var(--bad-fg));
        padding: 10px 13px;
        border-radius: 9px;
        background: hsl(var(--bad) / 0.1);
        border: 1px solid hsl(var(--bad) / 0.3);
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* Log */
      .log-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 20px 0 8px;
      }
      .log-title {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: hsl(var(--ink-dim));
      }
      .log-clear {
        font-size: 12px;
        color: hsl(var(--ink-dim));
        background: none;
        border: 0;
        padding: 2px 4px;
        cursor: pointer;
      }
      .log-clear:hover {
        color: hsl(var(--ink));
      }
      #log {
        height: 244px;
        overflow: auto;
        background: hsl(var(--bg));
        color: hsl(var(--ink-dim));
        border: 1px solid hsl(var(--line));
        border-radius: var(--radius);
        padding: 12px 14px;
        font:
          12px/1.65 ui-monospace,
          "SF Mono",
          "JetBrains Mono",
          Menlo,
          monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #log:empty::after {
        content: "等待操作输出…";
        color: hsl(var(--ink-dim) / 0.55);
      }
      #log::-webkit-scrollbar {
        width: 8px;
      }
      #log::-webkit-scrollbar-thumb {
        background: hsl(var(--line));
        border-radius: 4px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        ::before,
        ::after {
          animation-duration: 0.001ms !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>

        <div>
          <h1>Vibe Trading</h1>
          <p class="sub">桌面运行环境控制台</p>
        </div>
      </div>

      <div class="status">
        <div class="status-row">
          <span class="status-label">运行环境</span>
          <span id="envBadge" class="badge warn"
            ><span class="dot"></span>检测中</span
          >
        </div>
        <div class="status-row">
          <span class="status-label">研究服务</span>
          <span id="svcBadge" class="badge warn"
            ><span class="dot"></span>已停止</span
          >
        </div>
      </div>

      <div id="hint" class="hint" hidden>
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="9" />
          <line x1="12" y1="11" x2="12" y2="16" />
          <line x1="12" y1="8" x2="12.01" y2="8" />
        </svg>
        <span id="hintText"
          >运行环境如果处于“就绪”的状态，点击“启动服务”即可使用</span
        >
      </div>

      <div class="actions">
        <button id="btnInstall" class="btn-primary">安装 / 修复依赖</button>
        <button id="btnStart" class="btn-primary" disabled>启动服务</button>
        <button id="btnStop" class="btn-ghost" disabled>停止</button>
        <button id="btnOpen" class="btn-ghost" disabled>
          在浏览器打开 WebUI
        </button>
        <button id="btnLogs" class="btn-ghost">打开日志目录</button>
      </div>

      <div id="err"></div>

      <div class="log-head">
        <span class="log-title">运行日志</span>
        <button id="btnClear" class="log-clear" type="button">清空</button>
      </div>
      <div id="log" role="log" aria-live="polite"></div>
    </main>

    <script type="module">
      const $ = (id) => document.getElementById(id);
      const logEl = $("log"),
        errEl = $("err"),
        hintEl = $("hint"),
        hintText = $("hintText");
      let port = null;

      function log(line) {
        const atBottom =
          logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 40;
        logEl.textContent += line + "\n";
        if (atBottom) logEl.scrollTop = logEl.scrollHeight;
      }
      function setErr(m) {
        errEl.textContent = m ? String(m) : "";
      }

      // Tauri IPC may not be injected yet (or at all, if opened outside the app shell).
      // Guard so the front door degrades gracefully instead of throwing on load.
      function tauri() {
        const t = window.__TAURI__;
        if (!t?.core?.invoke)
          throw new Error(
            "桌面运行环境未就绪，请通过 Vibe Trading 应用打开此控制台。",
          );
        return t;
      }
      const invoke = (...a) => tauri().core.invoke(...a);

      // busy(): show a spinner + disable a button for the duration of an async action,
      // then restore its exact prior label/disabled state.
      async function busy(btn, label, fn) {
        const prevHTML = btn.innerHTML,
          prevDisabled = btn.disabled;
        btn.classList.add("busy");
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span>${label}`;
        try {
          return await fn();
        } finally {
          btn.classList.remove("busy");
          btn.innerHTML = prevHTML;
          btn.disabled = prevDisabled;
        }
      }

      const ENV = {
        ready: { txt: "就绪", cls: "ok", hint: null },
        incomplete: {
          txt: "依赖不全",
          cls: "warn",
          hint: "部分依赖缺失或损坏。点击 <b>安装 / 修复依赖</b> 补齐后即可启动服务。",
        },
        not_installed: {
          txt: "未安装",
          cls: "bad",
          hint: "首次使用需先安装依赖。点击 <b>安装 / 修复依赖</b>，过程可能持续几分钟，完成后即可启动。",
        },
      };

      function renderEnv(env) {
        const info = ENV[env] || { txt: "未知", cls: "warn", hint: null };
        const b = $("envBadge");
        b.className = "badge " + info.cls;
        b.innerHTML = `<span class="dot"></span>${info.txt}`;
        $("btnStart").disabled = env !== "ready" || port !== null;
        if (info.hint && port === null) {
          hintText.innerHTML = info.hint;
          hintEl.hidden = false;
        } else hintEl.hidden = true;
      }

      function renderSvc(running) {
        const b = $("svcBadge");
        b.className = "badge " + (running ? "ok live" : "warn");
        b.innerHTML = `<span class="dot"></span>${running ? "运行中" : "已停止"}`;
        $("btnStop").disabled = !running;
        $("btnOpen").disabled = !running;
        if (running) hintEl.hidden = true;
      }

      async function refresh() {
        try {
          const s = await invoke("console_status");
          renderEnv(s.env);
          renderSvc(s.service_running);
          setErr("");
        } catch (e) {
          setErr(e);
        }
      }

      if (window.__TAURI__?.event?.listen) {
        const { listen } = window.__TAURI__.event;
        listen("bootstrap://progress", (ev) => log(ev.payload));
        listen("bootstrap://exit", (ev) => {
          log("bootstrap 退出码: " + ev.payload);
          refresh();
        });
        listen("service://started", (ev) => {
          port = ev.payload;
          renderSvc(true);
          $("btnStart").disabled = true;
          hintEl.hidden = true;
        });
      }

      $("btnInstall").onclick = () =>
        busy($("btnInstall"), "安装中", async () => {
          setErr("");
          log("开始安装依赖…");
          try {
            await invoke("console_bootstrap");
          } catch (e) {
            setErr(e);
          }
        });
      $("btnStart").onclick = () =>
        busy($("btnStart"), "启动中", async () => {
          setErr("");
          try {
            port = await invoke("console_start_service");
            renderSvc(true);
            $("btnStart").disabled = true;
            hintEl.hidden = true;
          } catch (e) {
            setErr(e);
          }
        });
      $("btnStop").onclick = () =>
        busy($("btnStop"), "停止中", async () => {
          try {
            await invoke("console_stop_service");
            port = null;
            renderSvc(false);
            await refresh();
          } catch (e) {
            setErr(e);
          }
        });
      $("btnOpen").onclick = async () => {
        if (port !== null)
          try {
            await invoke("console_open_webui", { port });
          } catch (e) {
            setErr(e);
          }
      };
      $("btnLogs").onclick = async () => {
        try {
          await invoke("console_open_logs");
        } catch (e) {
          setErr(e);
        }
      };
      $("btnClear").onclick = () => (logEl.textContent = "");

      refresh();
      setInterval(refresh, 3000);
    </script>
  </body>
</html>
