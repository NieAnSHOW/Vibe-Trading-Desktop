# Project-level Comet guard config for this polyglot repo
# (python agent + react frontend + tauri rust). The guard's auto-detection
# (package.json "build" / pom.xml / Cargo.toml at repo root) does not apply
# here — the root package.json only carries the openspec tool — so tell the
# guard explicitly how to build and verify.
#
# Commands follow CLAUDE.md's documented syntax-check and test invocations.
#
# The three test_run_card.py deselects are fork-side pre-existing failures,
# confirmed failing at base 7e3747e via detached worktree (2026-07-03):
# RunResponse lacks the llm_usage/chart fields the upstream #223 tests assert.
# Unrelated to any desktop change — deselected so the guard reflects real
# regressions, not inherited debt. Remove once RunResponse is aligned upstream.
build_command: .venv/bin/python -m compileall -q agent/cli agent/api_server.py agent/mcp_server.py
verify_command: PYTHONPATH=agent .venv/bin/python -m pytest --ignore=agent/tests/e2e_backtest --ignore=agent/tests/test_e2e_harness_v2.py --deselect "agent/tests/test_run_card.py::test_api_run_response_includes_llm_usage" --deselect "agent/tests/test_run_card.py::test_api_run_response_summary_chart_payload_discovers_symbols" --deselect "agent/tests/test_run_card.py::test_api_run_response_can_filter_chart_symbol" --tb=short -q
